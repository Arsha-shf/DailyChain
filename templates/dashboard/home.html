{% extends "base.html" %}

{% block title %}Dashboard — DailyChain{% endblock %}

{% block content %}
<div class="mb-8">
    <h1 class="text-3xl font-bold text-white">Good to see you 👋</h1>
    <p class="text-gray-400 mt-1">Here's your day at a glance.</p>
</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <p class="text-gray-400 text-sm">Habits Today</p>
        <p class="text-4xl font-bold text-white mt-2">0/0</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <p class="text-gray-400 text-sm">Tasks Due</p>
        <p class="text-4xl font-bold text-white mt-2">0</p>
    </div>
    <div class="bg-gray-900 rounded-xl p-6 border border-gray-800">
        <p class="text-gray-400 text-sm">Spent This Month</p>
        <p class="text-4xl font-bold text-white mt-2">₺0</p>
    </div>
</div>
{% endblock %}
